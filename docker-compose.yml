services:
  backend:
    build:
      context: ./backend
      dockerfile: ../deploy/docker/Dockerfile.backend
    ports:
      - "8080:8080"
    volumes:
      - mikrotik-data:/data
    environment:
      - MIKROTIK_NMS_DB_PATH=/data/mikrotik-nms.db
      - MIKROTIK_NMS_LISTEN=:8080
      - MIKROTIK_NMS_JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - MIKROTIK_NMS_ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - MIKROTIK_NMS_DEFAULT_ROS_USER=${DEFAULT_ROS_USER:-admin}
      - MIKROTIK_NMS_DEFAULT_ROS_PASS=${DEFAULT_ROS_PASS:-}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    # NEXT_PUBLIC_* are inlined at build time, not read at runtime — do not
    # set them here. The frontend on port 3000 targets <hostname>:8080,
    # which matches the backend port published above.
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mikrotik-data:
