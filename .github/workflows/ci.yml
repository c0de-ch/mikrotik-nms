name: CI

# Runs build, vet and tests on every PR and on pushes to main so regressions
# are caught before they merge or deploy.

on:
  pull_request:
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (build · vet · test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build ./...
      - name: go test
        run: go test -race ./...

  frontend:
    name: Frontend (build · lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      # Lint is reported but not yet a hard gate — there is pre-existing lint
      # debt (see IMPROVEMENTS.md). Flip continue-on-error to false once cleared.
      - name: Lint
        run: npm run lint
        continue-on-error: true
