apiVersion: v1
kind: Service
metadata:
  name: mikrotik-nms-backend
  namespace: mikrotik-nms
spec:
  selector:
    app: mikrotik-nms
    component: backend
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: mikrotik-nms-frontend
  namespace: mikrotik-nms
spec:
  selector:
    app: mikrotik-nms
    component: frontend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
