apiVersion: apps/v1
kind: Deployment
metadata:
  name: mikrotik-nms-backend
  namespace: mikrotik-nms
  labels:
    app: mikrotik-nms
    component: backend
spec:
  replicas: 1  # Must be 1 — SQLite does not support multiple writers
  selector:
    matchLabels:
      app: mikrotik-nms
      component: backend
  template:
    metadata:
      labels:
        app: mikrotik-nms
        component: backend
    spec:
      containers:
        - name: backend
          # Published by .github/workflows/docker.yml. Replace the org/repo
          # path if you fork — this points to the upstream image.
          image: ghcr.io/c0de-ch/mikrotik-nms/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: data
              mountPath: /data
          envFrom:
            - configMapRef:
                name: mikrotik-nms-config
            - secretRef:
                name: mikrotik-nms-secrets
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: mikrotik-nms-data
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mikrotik-nms-frontend
  namespace: mikrotik-nms
  labels:
    app: mikrotik-nms
    component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mikrotik-nms
      component: frontend
  template:
    metadata:
      labels:
        app: mikrotik-nms
        component: frontend
    spec:
      containers:
        - name: frontend
          # Published by .github/workflows/docker.yml. Replace the org/repo
          # path if you fork — this points to the upstream image.
          image: ghcr.io/c0de-ch/mikrotik-nms/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://mikrotik-nms-backend:8080"
            - name: NEXT_PUBLIC_WS_URL
              value: "ws://mikrotik-nms-backend:8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
